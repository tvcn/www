        // 生成链接卡片HTML
        function createLinkCard(link) {
            const domain = domainMap[link.name] || "";
            const url = domain ? `https://${domain}` : "#";
            const hotClass = link.hot ? "tag-hot" : "";
            const textColor = link.dark ? "color:#000;" : "";
            return `
                <a href="${url}" target="_blank" rel="noopener noreferrer" class="${hotClass}" data-name="${link.name.toLowerCase()}" data-desc="${link.desc.toLowerCase()}">
                    <div class="link-icon" style="background: linear-gradient(135deg,${link.color});${textColor}">${link.icon}</div>
                    <span class="link-name">${link.name}</span>
                    <span class="link-desc">${link.desc}</span>
                </a>
            `;
        }

        // 生成分类HTML
        function createCategory(category) {
            const linksHtml = category.links.map(createLinkCard).join("");
            return `
                <div class="category">
                    <div class="category-title">${category.title}</div>
                    <div class="links-grid">${linksHtml}</div>
                </div>
            `;
        }

        // 渲染所有内容
        function renderAll() {
            Object.keys(siteData).forEach(sectionId => {
                const section = document.getElementById(sectionId);
                if (section) {
                    section.innerHTML = siteData[sectionId].map(createCategory).join("");
                }
            });
        }

        // 切换标签页
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            event.target.classList.add('active');
        }

        // 搜索功能
        function search() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) {
                document.querySelectorAll('.links-grid a').forEach(link => {
                    link.style.display = 'flex';
                });
                document.querySelectorAll('.category').forEach(cat => {
                    cat.style.display = 'block';
                });
                return;
            }

            let found = false;
            document.querySelectorAll('.category').forEach(category => {
                let hasMatch = false;
                const links = category.querySelectorAll('.links-grid a');
                links.forEach(link => {
                    const name = link.dataset.name;
                    const desc = link.dataset.desc;
                    if (name.includes(query) || desc.includes(query)) {
                        link.style.display = 'flex';
                        hasMatch = true;
                        found = true;
                    } else {
                        link.style.display = 'none';
                    }
                });
                category.style.display = hasMatch ? 'block' : 'none';
            });

            if (!found) {
                alert('未找到相关内容');
                document.querySelectorAll('.links-grid a').forEach(link => {
                    link.style.display = 'flex';
                });
                document.querySelectorAll('.category').forEach(cat => {
                    cat.style.display = 'block';
                });
            }
        }

        // 主题切换
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderAll();

            // 加载保存的主题
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            }

            // 搜索框回车事件
            document.getElementById('searchInput').addEventListener('keypress', e => {
                if (e.key === 'Enter') search();
            });
        });
    </script>
